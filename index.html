<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Wellness | Premium Psychological Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script>
        (function() { emailjs.init("jH5TwO1sLcWFwHHzu"); })(); // Your Public Key
        
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'apple-blue': '#0071e3', 'apple-gray': '#86868b', 'apple-dark': '#1d1d1f' },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #1d1d1f; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px); border-bottom: 0.5px solid rgba(0,0,0,0.1); z-index: 1000; }
        .hero-bg { background-image: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; }
        .premium-input { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 12px; padding: 1.25rem; width: 100%; transition: 0.3s; }
        .cta-btn { background: #0071e3; color: white; transition: 0.4s; box-shadow: 0 4px 14px 0 rgba(0,118,255,0.39); cursor: pointer; }
        .hidden { display: none !important; }
        #admin-panel { position: fixed; top: 0; right: 0; width: 350px; height: 100%; background: white; z-index: 3000; box-shadow: -10px 0 30px rgba(0,0,0,0.1); transform: translateX(100%); transition: 0.5s ease; overflow-y: auto; padding: 30px; }
        #admin-panel.active { transform: translateX(0); }
    </style>
</head>
<body class="font-sans">

    <nav class="fixed w-full glass-nav py-4 px-6 md:px-20 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-black rounded-lg flex items-center justify-center font-bold text-white text-xs">NW</div>
            <span class="text-xl font-bold tracking-tight uppercase">Nexus Wellness</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="#booking-section" class="cta-btn px-6 py-2.5 rounded-full text-[12px] font-bold">Consult Now</a>
            <button onclick="openAdmin()" class="w-10 h-10 rounded-full border flex items-center justify-center hover:bg-gray-100 transition"><i class="fas fa-cog text-gray-400 text-sm"></i></button>
        </div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-bold text-xl uppercase tracking-tighter">Nexus Control</h3>
            <button onclick="closeAdmin()"><i class="fas fa-times"></i></button>
        </div>
        <div id="admin-login" class="space-y-4 text-center">
            <p class="text-[10px] font-bold text-gray-400 uppercase">Secure Login</p>
            <input type="password" id="admin-pass" placeholder="Password" class="premium-input text-sm">
            <button onclick="verifyAdmin()" class="cta-btn w-full py-3 rounded-xl font-bold text-xs uppercase tracking-widest">Login</button>
            <button id="reset-btn" onclick="forgotPassword()" class="text-[10px] text-apple-blue font-bold uppercase mt-4 block mx-auto underline">Forgot Password?</button>
        </div>
        <div id="admin-controls" class="hidden space-y-5">
            <div><label class="text-[10px] font-bold text-gray-400 uppercase">Admin Email</label><input type="text" id="adm-email" class="premium-input text-sm"></div>
            <div><label class="text-[10px] font-bold text-gray-400 uppercase">WhatsApp No.</label><input type="text" id="adm-wa" class="premium-input text-sm"></div>
            <div><label class="text-[10px] font-bold text-gray-400 uppercase">UPI ID</label><input type="text" id="adm-upi" class="premium-input text-sm"></div>
            <div><label class="text-[10px] font-bold text-gray-400 uppercase">Current Fee (₹)</label><input type="number" id="adm-fee" class="premium-input text-sm"></div>
            <div><label class="text-[10px] font-bold text-gray-400 uppercase">Available Slots</label><textarea id="adm-slots" class="premium-input text-sm" rows="2"></textarea></div>
            <div class="pt-4 border-t border-red-50"><label class="text-[10px] font-bold text-red-400 uppercase tracking-widest">New Password</label><input type="text" id="adm-new-pass" placeholder="Change only if needed" class="premium-input text-sm border-red-100"></div>
            <button onclick="saveAdminSettings()" class="bg-black text-white w-full py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest">Save Changes</button>
        </div>
    </div>

    <section id="home" class="h-screen flex flex-col items-center justify-center text-center px-6 hero-bg">
        <div data-aos="fade-up">
            <h1 class="text-6xl md:text-[8rem] font-bold tracking-tighter text-apple-dark mb-8 leading-[0.9]">Reclaim Your <br><span class="text-apple-gray font-medium">Inner Peace.</span></h1>
            <a href="#booking-section" class="cta-btn px-14 py-4 rounded-full font-bold text-xs uppercase tracking-widest">Start Your Journey</a>
        </div>
    </section>

    <section id="booking-section" class="py-32 px-6 md:px-20 bg-white">
        <div class="max-w-4xl mx-auto" data-aos="zoom-in">
            <div class="bg-[#f5f5f7] p-10 md:p-20 rounded-[50px] border border-gray-100 text-center">
                <div id="booking-flow">
                    <form id="p-form" class="space-y-6" onsubmit="event.preventDefault(); showPayment();">
                        <h2 class="text-4xl md:text-6xl font-bold tracking-tight mb-4">Book Session.</h2>
                        <div class="grid md:grid-cols-2 gap-6 mt-12">
                            <input type="text" id="p_name" placeholder="Full Name" class="premium-input" required>
                            <input type="email" id="p_email" placeholder="Email Address" class="premium-input" required>
                        </div>
                        <div class="grid md:grid-cols-2 gap-6">
                            <input type="date" id="p_date" class="premium-input" required>
                            <select id="p_slot" class="premium-input" required></select>
                        </div>
                        <textarea id="p_concern" placeholder="What's on your mind?" class="premium-input" rows="2" required></textarea>
                        <div class="py-4"><h3 class="text-3xl font-bold text-apple-blue mt-1">₹<span id="display-fees">0</span></h3></div>
                        <button type="submit" class="cta-btn w-full py-5 rounded-full font-bold text-sm tracking-widest uppercase">Proceed to Payment</button>
                    </form>

                    <div id="p-payment" class="hidden space-y-8">
                        <div class="bg-white p-8 rounded-[40px] inline-block shadow-sm">
                            <img id="p-qr" src="" class="mx-auto w-56 h-56 mb-4">
                            <p id="p-upi-text" class="text-xs font-bold text-apple-blue font-mono"></p>
                        </div>
                        <input type="text" id="p_utr" maxlength="12" placeholder="ENTER 12-DIGIT UTR ID" class="premium-input text-center font-bold tracking-widest border-2 border-blue-100 max-w-xs mx-auto block">
                        <button onclick="unlockSession()" id="confirm-btn" class="cta-btn w-full py-5 rounded-full font-bold text-sm tracking-widest uppercase">Confirm & Connect</button>
                    </div>

                    <div id="p-success" class="hidden space-y-8">
                        <div class="bg-green-50 text-green-600 p-8 rounded-[40px] font-bold border border-green-100">
                            Booking Details Received! <br> Backup sent to your Gmail.
                        </div>
                        <a id="p-wa" href="#" target="_blank" class="block w-full bg-[#25D366] text-white py-6 rounded-full font-bold text-sm uppercase tracking-widest text-center shadow-lg">
                            <i class="fab fa-whatsapp mr-2 text-xl"></i> Chat with Dr. Lalit
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-apple-gray text-[10px] font-bold tracking-widest uppercase">© 2026 NEXUS WELLNESS</footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        AOS.init();

        // MASTER CONFIG DATA
        let nexusConfig = JSON.parse(localStorage.getItem('nexusData')) || {
            waNum: "+917830232077",
            upiId: "7830232077@ptsbi",
            fee: "500",
            adminPass: "Nexus786",
            adminEmail: "thenexusstudy3@gmail.com",
            slots: "10:00 AM, 02:00 PM, 06:00 PM"
        };

        function updateUI() {
            document.getElementById('display-fees').innerText = nexusConfig.fee;
            const slotSelect = document.getElementById('p_slot');
            slotSelect.innerHTML = '<option value="">Select Time Slot</option>';
            nexusConfig.slots.split(',').forEach(s => { slotSelect.innerHTML += `<option>${s.trim()}</option>`; });
        }
        updateUI();

        function openAdmin() { document.getElementById('admin-panel').classList.add('active'); }
        function closeAdmin() { document.getElementById('admin-panel').classList.remove('active'); }

        function verifyAdmin() {
            if(document.getElementById('admin-pass').value === nexusConfig.adminPass) {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('adm-wa').value = nexusConfig.waNum;
                document.getElementById('adm-upi').value = nexusConfig.upiId;
                document.getElementById('adm-fee').value = nexusConfig.fee;
                document.getElementById('adm-slots').value = nexusConfig.slots;
                document.getElementById('adm-email').value = nexusConfig.adminEmail;
            } else { alert("Incorrect Password!"); }
        }

        // PASSWORD RECOVERY VIA EMAILJS OTP
        function forgotPassword() {
            const btn = document.getElementById('reset-btn');
            btn.innerText = "Sending Verification Code...";
            const otp = Math.floor(100000 + Math.random() * 900000);
            
            emailjs.send("service_w0vxgvf", "template_jly5j22", {
                p_name: "Admin",
                p_otp: otp,
                p_concern: "Admin Password Recovery Request"
            }).then(() => {
                const userOtp = prompt("Enter 6-digit OTP sent to: " + nexusConfig.adminEmail);
                if(userOtp == otp) {
                    alert("Verified! Your current password is: " + nexusConfig.adminPass);
                } else { alert("Invalid OTP!"); }
                btn.innerText = "Forgot Password?";
            });
        }

        function saveAdminSettings() {
            nexusConfig.waNum = document.getElementById('adm-wa').value;
            nexusConfig.upiId = document.getElementById('adm-upi').value;
            nexusConfig.fee = document.getElementById('adm-fee').value;
            nexusConfig.slots = document.getElementById('adm-slots').value;
            nexusConfig.adminEmail = document.getElementById('adm-email').value;
            
            const np = document.getElementById('adm-new-pass').value;
            if(np.trim() !== "") nexusConfig.adminPass = np;

            localStorage.setItem('nexusData', JSON.stringify(nexusConfig));
            updateUI();
            alert("Nexus Settings Updated!");
            closeAdmin();
        }

        function showPayment() {
            const upiUrl = `upi://pay?pa=${nexusConfig.upiId}&pn=Nexus%20Wellness&am=${nexusConfig.fee}&cu=INR`;
            document.getElementById('p-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiUrl)}`;
            document.getElementById('p-upi-text').innerText = nexusConfig.upiId;
            document.getElementById('p-form').classList.add('hidden');
            document.getElementById('p-payment').classList.remove('hidden');
        }

        function unlockSession() {
            const utr = document.getElementById('p_utr').value;
            if(utr.length < 12) { alert("Please enter valid 12-digit UTR ID!"); return; }
            
            const btn = document.getElementById('confirm-btn');
            btn.innerText = "Backing up Details...";

            const formData = {
                p_name: document.getElementById('p_name').value,
                p_email: document.getElementById('p_email').value,
                p_date: document.getElementById('p_date').value,
                p_slot: document.getElementById('p_slot').value,
                p_fee: nexusConfig.fee,
                p_utr: utr,
                p_concern: document.getElementById('p_concern').value
            };

            // EmailJS Backup to Admin
            emailjs.send("service_w0vxgvf", "template_jly5j22", formData)
            .then(() => {
                const waUrl = `https://wa.me/${nexusConfig.waNum.replace('+', '')}?text=New%20Nexus%20Booking!%0A---%0AName:%20${formData.p_name}%0ADate:%20${formData.p_date}%0ATime:%20${formData.p_slot}%0AUTR:%20${utr}%0A---%0APlease%20confirm%20my%20session.`;
                document.getElementById('p-wa').href = waUrl;
                document.getElementById('p-payment').classList.add('hidden');
                document.getElementById('p-success').classList.remove('hidden');
                window.open(waUrl, '_blank');
            });
        }
    </script>
</body>
</html>
